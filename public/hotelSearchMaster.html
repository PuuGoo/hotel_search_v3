<!DOCTYPE html>
<html lang="vi" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brave Hotel Search</title>
    <meta name="description" content="Tìm kiếm khách sạn từ Excel với Brave Search" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerrpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.2/xlsx.full.min.js"></script>
    <script defer src="/analytics-init.js"></script>
    <script>
      if (!window.Toasts) {
        window.Toasts = {
          show: function(msg, opts) { console.log("[Toast]", (opts && opts.type) || "info", msg); },
          success: function(msg) { console.log("[Toast] success", msg); },
          error: function(msg) { console.log("[Toast] error", msg); },
          warning: function(msg) { console.log("[Toast] warning", msg); },
          info: function(msg) { console.log("[Toast] info", msg); },
        };
      }
    </script>
  </head>
  <body>
    <a href="#mainContent" class="skip-link">Bỏ qua tới nội dung</a>
    <header class="app-header no-print">
      <div class="app-header-inner">
        <div class="brand">
          <span class="logo"><i class="fa-solid fa-hotel"></i></span>
          <span>Hotel Search</span>
        </div>
        <nav class="flex gap-sm center" style="margin-left: auto">
          <a href="/searchTavily" class="btn btn-outline btn-small"><i class="fa-solid fa-magnifying-glass"></i> Tavily</a>
          <a href="/BRAVE_MASTER" class="btn btn-primary btn-small"><i class="fa-brands fa-brave"></i> Brave</a>
          <div class="clock" aria-label="Đồng hồ">--:--:--</div>
          <span id="currentUser" class="text-secondary" style="font-size: 0.82rem"></span>
          <button id="themeToggle" type="button" class="btn btn-outline btn-pill" title="Đổi giao diện (Alt+D)">
            <i class="fa-solid fa-circle-half-stroke"></i>
          </button>
          <form method="POST" action="/logout" style="display:inline">
            <button type="submit" class="btn btn-outline btn-small"><i class="fa-solid fa-right-from-bracket"></i></button>
          </form>
        </nav>
      </div>
    </header>

    <main id="mainContent" class="container fade-in" style="padding-top: var(--spacing-lg)">
      <section class="glass-card" style="max-width: 720px; margin: 0 auto">
        <h1 style="font-size: 1.4rem; margin-bottom: var(--spacing-lg)">
          <i class="fa-solid fa-shield-halved" style="color: var(--focus-ring)"></i> Tìm kiếm khách sạn (Brave)
        </h1>

        <div class="form-group">
          <label for="subscriptionKey" class="form-label">Brave API Key</label>
          <input type="password" id="subscriptionKey" class="form-input" placeholder="Nhập Brave Subscription Key" autocomplete="off" />
        </div>

        <div class="drop-zone" id="dropZone" role="button" tabindex="0" aria-label="Kéo thả hoặc nhấn để chọn file Excel">
          <i class="fa-solid fa-cloud-arrow-up" style="font-size: 2rem; color: var(--text-tertiary)"></i>
          <p class="text-secondary" style="margin: var(--spacing-sm) 0">Kéo thả file Excel vào đây hoặc nhấn để chọn</p>
          <span id="fileName" class="text-tertiary" style="font-size: 0.82rem">Chưa chọn file</span>
          <input type="file" id="fileInput" accept=".xlsx,.xls" hidden />
        </div>

        <div class="flex gap-sm center" style="margin-top: var(--spacing-md)">
          <button id="searchButton" type="button" class="btn btn-primary">
            <i class="fa-solid fa-magnifying-glass"></i> Bắt đầu tìm kiếm
          </button>
          <button id="downloadCSVButton" type="button" class="btn btn-success hidden">
            <i class="fa-solid fa-download"></i> Tải CSV
          </button>
        </div>

        <div id="progressContainer" class="hidden" style="margin-top: var(--spacing-md)">
          <div class="flex justify-between text-sm" style="margin-bottom: 4px">
            <span id="progressText" class="text-secondary">0%</span>
            <span id="counter" class="text-tertiary">0/0</span>
          </div>
          <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="progressBar" class="progress-bar-fill" style="width: 0%"></div>
          </div>
        </div>

        <div id="statusText" class="text-secondary" style="margin-top: var(--spacing-sm); font-size: 0.82rem"></div>
      </section>

      <section id="resultsSection" class="glass-card hidden" style="margin-top: var(--spacing-lg)" aria-live="polite">
        <div class="flex justify-between center" style="margin-bottom: var(--spacing-md)">
          <h2 style="font-size: 1.1rem; margin: 0">Kết quả tìm kiếm</h2>
          <div class="badge" style="background: rgba(255,255,255,0.1)">
            Tổng: <span id="resultsCount">0</span>
          </div>
        </div>
        <div class="table-wrapper" style="max-height: 64vh; overflow: auto">
          <table>
            <thead>
              <tr>
                <th>Order</th>
                <th>No</th>
                <th>Hotel Name</th>
                <th>Country</th>
                <th>City</th>
                <th>Matched Links</th>
              </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="app-footer text-tertiary">
      &copy; <span id="year"></span> PuuGoo
    </footer>

    <script type="module" src="/ui.js"></script>
    <script src="hotelSearchMaster.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        if (params.get("success") === "1") {
          Toasts.success("Đăng nhập thành công");
          history.replaceState(null, "", "/BRAVE_MASTER");
        }
        if (params.get("logout") === "1") {
          Toasts.success("Đã đăng xuất");
          history.replaceState(null, "", "/login");
        }
        document.getElementById("year").textContent = new Date().getFullYear();

        fetch("/api/me")
          .then((r) => r.json())
          .then((user) => {
            document.getElementById("currentUser").textContent = user.displayName || user.username;
          })
          .catch(() => {});
      });
    </script>
  </body>
</html>
