<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circuit Breaker Dashboard</title>
  <link rel="stylesheet" href="/app.css">
  <style>
    .breaker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .breaker-card { background: var(--card-bg, #1a1a2e); border: 1px solid var(--border, #333); border-radius: 8px; padding: 1.25rem; }
    .breaker-card.healthy { border-left: 4px solid #10b981; }
    .breaker-card.degraded { border-left: 4px solid #ef4444; }
    .breaker-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
    .breaker-state { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.85rem; font-weight: 500; }
    .state-closed { background: #10b98120; color: #10b981; }
    .state-open { background: #ef444420; color: #ef4444; }
    .state-half-open { background: #f59e0b20; color: #f59e0b; }
    .breaker-stat { display: flex; justify-content: space-between; padding: 0.25rem 0; font-size: 0.9rem; color: #999; }
    .breaker-stat span:last-child { color: #ddd; font-weight: 500; }
    .summary-bar { display: flex; gap: 2rem; margin-bottom: 1.5rem; padding: 1rem; background: var(--card-bg, #1a1a2e); border-radius: 8px; }
    .summary-item { text-align: center; }
    .summary-value { font-size: 2rem; font-weight: 700; }
    .summary-label { font-size: 0.85rem; color: #999; }
    .btn-reset { background: #3b82f6; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; margin-top: 0.5rem; }
    .btn-reset:hover { background: #2563eb; }
    .status-ok { color: #10b981; }
    .status-degraded { color: #ef4444; }
    .auto-refresh { display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; font-size: 0.85rem; color: #999; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #555; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/circuit-breakers" class="active">Circuit Breakers</a>
    <a href="/admin">Admin</a>
  </nav>

  <main class="container">
    <h1>Circuit Breaker Dashboard</h1>
    <p id="error-msg" style="color: #ef4444; display: none;"></p>

    <div class="summary-bar" id="summary" style="display: none;">
      <div class="summary-item">
        <div class="summary-value" id="total-count">0</div>
        <div class="summary-label">Total</div>
      </div>
      <div class="summary-item">
        <div class="summary-value status-ok" id="healthy-count">0</div>
        <div class="summary-label">Healthy</div>
      </div>
      <div class="summary-item">
        <div class="summary-value status-degraded" id="unhealthy-count">0</div>
        <div class="summary-label">Unhealthy</div>
      </div>
      <div class="summary-item">
        <div class="summary-value" id="overall-status">-</div>
        <div class="summary-label">Status</div>
      </div>
    </div>

    <div class="breaker-grid" id="breaker-grid"></div>

    <div class="auto-refresh">
      <label><input type="checkbox" id="auto-refresh" checked> Auto-refresh</label>
      <span id="last-updated"></span>
      <button onclick="loadBreakers()" style="background:none;border:1px solid #555;color:#ddd;padding:4px 10px;border-radius:4px;cursor:pointer;">Refresh</button>
    </div>
  </main>

  <script>
    let refreshTimer = null;

    async function loadBreakers() {
      const errorMsg = document.getElementById("error-msg");
      const summary = document.getElementById("summary");
      const grid = document.getElementById("breaker-grid");

      try {
        const res = await fetch("/api/circuit-breakers");
        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || `HTTP ${res.status}`);
        }
        const data = await res.json();

        errorMsg.style.display = "none";
        summary.style.display = "flex";

        document.getElementById("total-count").textContent = data.totalBreakers;
        document.getElementById("healthy-count").textContent = data.healthy;
        document.getElementById("unhealthy-count").textContent = data.unhealthy;

        const statusEl = document.getElementById("overall-status");
        statusEl.textContent = data.status;
        statusEl.className = data.status === "ok" ? "summary-value status-ok" : "summary-value status-degraded";

        grid.innerHTML = data.breakers.map(b => `
          <div class="breaker-card ${b.healthy ? "healthy" : "degraded"}">
            <div class="breaker-name">${escapeHtml(b.name)}</div>
            <span class="breaker-state state-${b.state}">${b.state}</span>
            <div class="breaker-stat"><span>Failures</span><span>${b.failureCount}</span></div>
            ${b.lastFailureAge !== null ? `<div class="breaker-stat"><span>Last failure</span><span>${formatAge(b.lastFailureAge)} ago</span></div>` : ""}
            ${!b.healthy ? `<button class="btn-reset" onclick="resetBreaker('${escapeHtml(b.name)}')">Reset</button>` : ""}
          </div>
        `).join("");

        document.getElementById("last-updated").textContent = `Updated: ${new Date().toLocaleTimeString()}`;
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = "block";
        summary.style.display = "none";
        grid.innerHTML = "";
      }
    }

    async function resetBreaker(name) {
      try {
        const res = await fetch(`/api/circuit-breakers/${encodeURIComponent(name)}/reset`, { method: "POST" });
        if (!res.ok) throw new Error("Reset failed");
        loadBreakers();
      } catch (err) {
        alert("Failed to reset: " + err.message);
      }
    }

    function formatAge(ms) {
      if (ms < 1000) return ms + "ms";
      if (ms < 60000) return Math.round(ms / 1000) + "s";
      if (ms < 3600000) return Math.round(ms / 60000) + "m";
      return Math.round(ms / 3600000) + "h";
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById("auto-refresh").addEventListener("change", (e) => {
      if (e.target.checked) {
        refreshTimer = setInterval(loadBreakers, 5000);
      } else {
        clearInterval(refreshTimer);
        refreshTimer = null;
      }
    });

    loadBreakers();
    refreshTimer = setInterval(loadBreakers, 5000);
  </script>
</body>
</html>
