<!DOCTYPE html>
<html lang="vi" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng nhập | Hotel Search</title>
    <meta name="description" content="Đăng nhập hệ thống Hotel Search" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/app.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script defer src="/analytics-init.js"></script>
    <script>
      if (!window.Toasts) {
        window.Toasts = {
          show: function(msg, opts) { console.log("[Toast]", (opts && opts.type) || "info", msg); },
          success: function(msg) { console.log("[Toast] success", msg); },
          error: function(msg) { console.log("[Toast] error", msg); },
          warning: function(msg) { console.log("[Toast] warning", msg); },
          info: function(msg) { console.log("[Toast] info", msg); },
        };
      }
    </script>
    <style>
      .login-wrapper {
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1;
      }
      .login-card {
        max-width: 420px;
        width: 100%;
        padding: var(--spacing-xl) var(--spacing-lg);
      }
      .login-brand {
        text-align: center;
        margin-bottom: var(--spacing-lg);
      }
      .login-brand .logo-mark {
        width: 56px;
        height: 56px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-md);
        background: var(--gradient-gold);
        color: var(--text-inverse);
        font-size: 1.5rem;
        margin-bottom: var(--spacing-sm);
        box-shadow: var(--shadow-gold);
      }
      .login-brand h1 {
        font-family: var(--font-display);
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--text-primary);
        margin: 0 0 4px;
        letter-spacing: 0.02em;
      }
      .login-brand .subtitle {
        font-size: var(--font-size-sm);
        color: var(--text-tertiary);
        letter-spacing: 0.04em;
      }
      .divider {
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
        margin: var(--spacing-md) 0;
        color: var(--text-tertiary);
        font-size: var(--font-size-xs);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .divider::before, .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--color-border);
      }
      .login-footer {
        text-align: center;
        margin-top: var(--spacing-lg);
        padding-top: var(--spacing-md);
        border-top: 1px solid var(--color-border-subtle);
      }
      .login-footer a {
        color: var(--text-tertiary);
        font-size: var(--font-size-xs);
        transition: color var(--transition-fast);
      }
      .login-footer a:hover { color: var(--color-gold); }
    </style>
  </head>
  <body>
    <a href="#loginForm" class="skip-link">Bỏ qua tới form đăng nhập</a>
    <header class="app-header no-print">
      <div class="app-header-inner">
        <div class="brand">
          <span class="logo"><i class="fa-solid fa-hotel"></i></span>
          <span>Hotel Search</span>
        </div>
        <div class="flex gap-sm center" style="margin-left: auto">
          <div class="clock" aria-label="Đồng hồ thời gian thực">--:--:--</div>
          <button
            id="themeToggle"
            type="button"
            class="btn btn-outline btn-pill"
            title="Đổi giao diện (Alt+D)"
          >
            <i class="fa-solid fa-circle-half-stroke"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="container login-wrapper">
      <form
        id="loginForm"
        method="POST"
        action="/login"
        class="glass-card gradient animate-fade-in login-card"
      >
        <div class="login-brand">
          <div class="logo-mark">
            <i class="fa-solid fa-hotel"></i>
          </div>
          <h1>Hotel Search</h1>
          <div class="subtitle">Đăng nhập để tiếp tục</div>
        </div>

        <div class="form-row">
          <div class="form-col" style="flex: 1 1 100%">
            <label for="username">Tên đăng nhập</label>
            <div class="input-group">
              <span class="input-icon"><i class="fa-solid fa-user"></i></span>
              <input
                id="username"
                name="username"
                type="text"
                class="has-icon"
                autocomplete="username"
                required
                placeholder="Nhập tên đăng nhập"
              />
            </div>
          </div>
          <div class="form-col" style="flex: 1 1 100%">
            <label for="password">Mật khẩu</label>
            <div class="input-group">
              <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
              <input
                id="password"
                name="password"
                type="password"
                class="has-icon"
                autocomplete="current-password"
                required
                placeholder="Nhập mật khẩu"
              />
            </div>
          </div>
        </div>

        <div style="margin-top: var(--spacing-lg)">
          <button
            type="submit"
            class="btn btn-primary btn-modern btn-large w-100"
          >
            <i class="fa-solid fa-right-to-bracket"></i>
            <span>Đăng nhập</span>
          </button>
        </div>

        <div class="divider">hoặc</div>

        <div class="flex gap-sm" style="justify-content: center">
          <a href="/forgot-password" class="btn btn-outline btn-small">
            <i class="fa-solid fa-key"></i> Quên mật khẩu?
          </a>
          <button type="button" id="showAbout" class="btn btn-outline btn-small">
            <i class="fa-solid fa-circle-info"></i> Thông tin
          </button>
        </div>

        <div class="login-footer">
          <span class="text-tertiary" style="font-size: var(--font-size-xs)">
            &copy; <span id="year"></span> Hotel Search &mdash; PuuGoo
          </span>
        </div>
      </form>
    </main>

    <script type="module" src="/ui.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        if (params.get("error") === "1") {
          Toasts.error("Sai tài khoản hoặc mật khẩu");
          history.replaceState(null, "", "/");
        } else if (params.get("error") === "2") {
          Toasts.error("Lỗi server, thử lại sau");
          history.replaceState(null, "", "/");
        } else if (params.get("logout") === "1") {
          Toasts.success("Đã đăng xuất");
          history.replaceState(null, "", "/");
        }

        document.getElementById("year").textContent = new Date().getFullYear();

        const btn = document.getElementById("themeToggle");
        const applyIcon = () => {
          const th = document.documentElement.getAttribute("data-theme");
          btn.innerHTML =
            th === "light"
              ? '<i class="fa-solid fa-sun"></i>'
              : '<i class="fa-solid fa-moon"></i>';
        };
        btn.addEventListener("click", () => {
          const cur = document.documentElement.getAttribute("data-theme");
          const next = cur === "dark" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", next);
          localStorage.setItem("theme", next);
          applyIcon();
        });
        const stored = localStorage.getItem("theme");
        if (stored) {
          document.documentElement.setAttribute("data-theme", stored);
        }
        applyIcon();

        document.getElementById("showAbout").addEventListener("click", () => {
          import("/ui.js").then((m) => {
            m.Modal.open(
              `<h2 class='modal-header'>Giới thiệu</h2><p style='margin:0 0 12px;font-size:.9rem;line-height:1.6;color:var(--text-secondary)'>Hệ thống tìm kiếm khách sạn với giao diện Imperial Hanoi &mdash; thiết kế sang trọng, tối ưu hiệu suất.</p><div class='modal-actions'><button class='btn btn-outline' data-close>Đóng</button></div>`,
              { onClose: null }
            );
            const closeBtn = document.querySelector(".modal [data-close]");
            if (closeBtn)
              closeBtn.addEventListener("click", () =>
                document.querySelector(".modal-overlay")?.remove()
              );
          });
        });
      });
    </script>
  </body>
</html>
