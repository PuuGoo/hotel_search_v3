<!DOCTYPE html>
<html lang="vi" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quên mật khẩu | Hotel Search</title>
    <meta name="description" content="Yêu cầu đặt lại mật khẩu" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
      if (!window.Toasts) {
        window.Toasts = {
          show: function(msg, opts) { console.log("[Toast]", (opts && opts.type) || "info", msg); },
          success: function(msg) { console.log("[Toast] success", msg); },
          error: function(msg) { console.log("[Toast] error", msg); },
          warning: function(msg) { console.log("[Toast] warning", msg); },
          info: function(msg) { console.log("[Toast] info", msg); },
        };
      }
    </script>
  </head>
  <body>
    <a href="#forgotForm" class="skip-link">Bỏ qua tới form</a>
    <header class="app-header no-print">
      <div class="app-header-inner">
        <div class="brand">
          <span class="logo"><i class="fa-solid fa-hotel"></i></span>
          <span>Hotel Search</span>
        </div>
        <div class="flex gap-sm center" style="margin-left: auto">
          <button id="themeToggle" type="button" class="btn btn-outline btn-pill" title="Đổi giao diện">
            <i class="fa-solid fa-circle-half-stroke"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="container" style="min-height: calc(100vh - 140px); display: flex; align-items: center; justify-content: center">
      <div class="glass-card gradient animate-fade-in" style="max-width: 440px; width: 100%">
        <h1 class="gradient-text" style="font-size: 1.4rem; margin: 0 0 6px">
          <i class="fa-solid fa-key"></i> Quên mật khẩu
        </h1>
        <p class="text-secondary" style="margin-top: 0; margin-bottom: var(--spacing-md); font-size: 0.82rem">
          Nhập tên đăng nhập để nhận mã đặt lại mật khẩu.
        </p>

        <form id="forgotForm" class="stack-sm">
          <div class="form-col">
            <label for="username">Tên đăng nhập</label>
            <div class="input-group">
              <span class="input-icon"><i class="fa-solid fa-user"></i></span>
              <input id="username" type="text" class="has-icon" required placeholder="Nhập tên đăng nhập" autocomplete="username" />
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-modern" style="margin-top: var(--spacing-xs)">
            <i class="fa-solid fa-paper-plane"></i><span>Gửi mã đặt lại</span>
          </button>
        </form>

        <div id="resultSection" style="display: none; margin-top: var(--spacing-md)">
          <div class="glass-card" style="background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3)">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px">
              <i class="fa-solid fa-check-circle" style="color: #22c55e"></i>
              <strong style="color: #22c55e">Mã đã được tạo</strong>
            </div>
            <p style="font-size: 0.82rem; color: var(--text-secondary); margin: 0 0 12px">
              Sử dụng mã bên dưới để đặt lại mật khẩu. Mã có hiệu lực trong 1 giờ.
            </p>
            <div style="background: var(--color-surface-alt); padding: 12px; border-radius: 8px; word-break: break-all; font-family: monospace; font-size: 0.75rem">
              <span id="resetToken"></span>
            </div>
            <div style="margin-top: 12px; display: flex; gap: 8px">
              <button id="copyTokenBtn" class="btn btn-outline btn-small">
                <i class="fa-solid fa-copy"></i> Sao chép mã
              </button>
              <a id="resetLink" href="#" class="btn btn-primary btn-small">
                <i class="fa-solid fa-arrow-right"></i> Đặt lại mật khẩu
              </a>
            </div>
          </div>
        </div>

        <div class="card-footer" style="margin-top: var(--spacing-md)">
          <a href="/" style="color: var(--text-tertiary); font-size: 0.78rem">
            <i class="fa-solid fa-arrow-left"></i> Quay lại đăng nhập
          </a>
        </div>
      </div>
    </main>

    <script type="module" src="/ui.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const btn = document.getElementById("themeToggle");
        const applyIcon = () => {
          const th = document.documentElement.getAttribute("data-theme");
          btn.innerHTML = th === "light" ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
        };
        btn.addEventListener("click", () => {
          const cur = document.documentElement.getAttribute("data-theme");
          const next = cur === "dark" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", next);
          localStorage.setItem("theme", next);
          applyIcon();
        });
        const stored = localStorage.getItem("theme");
        if (stored) document.documentElement.setAttribute("data-theme", stored);
        applyIcon();

        document.getElementById("forgotForm").addEventListener("submit", async (e) => {
          e.preventDefault();
          const username = document.getElementById("username").value.trim();
          if (!username) return;

          try {
            const res = await fetch("/api/forgot-password", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username }),
            });
            const data = await res.json();

            if (data.token) {
              document.getElementById("resetToken").textContent = data.token;
              document.getElementById("resetLink").href = "/reset-password?token=" + data.token;
              document.getElementById("resultSection").style.display = "block";
              document.getElementById("forgotForm").style.display = "none";
              Toasts.success("Mã đặt lại đã được tạo");
            } else {
              Toasts.success(data.message || "Nếu tài khoản tồn tại, mã đã được gửi");
            }
          } catch {
            Toasts.error("Lỗi kết nối");
          }
        });

        document.getElementById("copyTokenBtn").addEventListener("click", () => {
          const token = document.getElementById("resetToken").textContent;
          navigator.clipboard.writeText(token).then(() => {
            Toasts.success("Đã sao chép mã");
          }).catch(() => {
            Toasts.error("Không thể sao chép");
          });
        });
      });
    </script>
  </body>
</html>
