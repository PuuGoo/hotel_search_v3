<!DOCTYPE html>
<html lang="vi" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Comparison History | Hotel Search</title>
    <meta name="description" content="Lịch sử so sánh kết quả tìm kiếm" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script defer src="/analytics-init.js"></script>
    <style>
      .comparison-card {
        padding: var(--spacing-md);
        margin-bottom: var(--spacing-xs);
        cursor: pointer;
        transition: all 0.15s;
      }
      .comparison-card:hover { border-color: var(--color-gold); }
      .engine-badge {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; font-weight: 600;
      }
      .result-section { margin-bottom: var(--spacing-md); }
      .result-section h3 { font-size: 0.85rem; margin-bottom: var(--spacing-sm); display: flex; align-items: center; gap: 8px; }
      .result-item { padding: 6px 0; border-bottom: 1px solid var(--color-border); font-size: 0.8rem; }
      .result-item:last-child { border-bottom: none; }
    </style>
  </head>
  <body>
    <div class="container" style="max-width: 960px; padding-top: var(--spacing-lg)">
      <div class="card" style="margin-bottom: var(--spacing-md)">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px">
          <div>
            <h1 style="font-size: 1.4rem; margin: 0">
              <i class="fa-solid fa-code-compare" style="color: #d4a853"></i> Comparison History
            </h1>
            <p style="color: var(--text-tertiary); font-size: 0.82rem; margin: 4px 0 0">
              Lịch sử so sánh kết quả giữa các engine
            </p>
          </div>
          <div style="display: flex; gap: 6px">
            <a href="/comparison" class="btn btn-outline btn-small"><i class="fa-solid fa-code-compare"></i> Compare</a>
            <a href="/dashboard" class="btn btn-outline btn-small"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
          </div>
        </div>
      </div>

      <div id="historyList">
        <div class="empty-state" style="text-align:center;padding:40px;color:var(--text-tertiary)">
          <i class="fa-solid fa-spinner fa-spin"></i> Đang tải...
        </div>
      </div>

      <!-- Detail Modal -->
      <div id="detailModal" class="modal-overlay" style="display:none">
        <div style="background:var(--bg-secondary,#1a1a2e);border-radius:12px;padding:24px;max-width:900px;width:95%;max-height:85vh;overflow-y:auto;border:1px solid var(--border,#333)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <h2 id="detailTitle" style="margin:0;font-size:1.1rem"></h2>
            <button onclick="document.getElementById('detailModal').style.display='none'" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:1.2rem">&times;</button>
          </div>
          <div id="detailContent"></div>
        </div>
      </div>
    </div>

    <script type="module">
      import { Toasts, escapeHtml } from "/ui.js";
      import { initSessionTimeout } from "/sessionTimeout.js";
      initSessionTimeout();

      const engineIcons = { tavily: "fa-hotel", google: "fa-google", ddg: "fa-searchengin" };
      const engineColors = { tavily: "#d4a853", google: "#4285f4", ddg: "#de5833" };
      const engineLabels = { tavily: "Tavily", google: "Google", ddg: "DuckDuckGo" };

      let historyData = [];

      async function loadHistory() {
        try {
          const res = await fetch("/api/compare/history");
          if (!res.ok) throw new Error("Failed to load");
          historyData = await res.json();
          renderList();
        } catch {
          Toasts.error("Không thể tải lịch sử");
        }
      }

      function renderList() {
        const container = document.getElementById("historyList");

        if (historyData.length === 0) {
          container.innerHTML = `
            <div class="card" style="text-align:center;padding:40px;color:var(--text-tertiary)">
              <i class="fa-solid fa-code-compare" style="font-size:2rem;display:block;margin-bottom:12px;opacity:0.3"></i>
              <div style="font-size:0.9rem">Chưa có lịch sử so sánh</div>
              <div style="font-size:0.75rem;margin-top:6px">Thực hiện so sánh và lưu kết quả để xem lại</div>
              <a href="/comparison" class="btn btn-primary btn-small" style="margin-top:12px"><i class="fa-solid fa-code-compare"></i> So sánh ngay</a>
            </div>`;
          return;
        }

        container.innerHTML = historyData.map(c => {
          const date = new Date(c.timestamp).toLocaleString("vi-VN");
          const engineBadges = (c.engines || []).map(e =>
            `<span class="engine-badge" style="background:${engineColors[e] || '#666'}22;color:${engineColors[e] || '#666'}">
              <i class="fa-solid ${engineIcons[e] || 'fa-search'}"></i> ${engineLabels[e] || e}
            </span>`
          ).join(" ");
          const errorBadge = c.hasErrors
            ? '<span class="badge" style="background:rgba(239,68,68,.2);color:#ef4444;font-size:0.6rem;margin-left:4px">Có lỗi</span>'
            : "";

          return `<div class="card comparison-card" data-id="${c.id}">
            <div style="display:flex;align-items:center;gap:12px">
              <div style="flex:1;min-width:0">
                <div style="font-weight:600;font-size:0.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(c.query)}</div>
                <div style="display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap">
                  ${engineBadges}${errorBadge}
                  <span style="font-size:0.7rem;color:var(--text-tertiary)">${c.resultCount} kết quả</span>
                </div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div style="font-size:0.7rem;color:var(--text-tertiary)">${date}</div>
                <button class="btn btn-outline btn-small btn-delete" data-id="${c.id}" style="margin-top:4px;padding:2px 8px;font-size:0.65rem;color:#ff4d4f">
                  <i class="fa-solid fa-trash"></i>
                </button>
              </div>
            </div>
          </div>`;
        }).join("");

        container.querySelectorAll(".comparison-card").forEach(card => {
          card.addEventListener("click", (e) => {
            if (e.target.closest(".btn-delete")) return;
            showDetail(card.dataset.id);
          });
        });

        container.querySelectorAll(".btn-delete").forEach(btn => {
          btn.addEventListener("click", async (e) => {
            e.stopPropagation();
            if (!confirm("Xóa so sánh này?")) return;
            try {
              const res = await fetch(`/api/compare/history/${btn.dataset.id}`, { method: "DELETE" });
              if (res.ok) {
                Toasts.success("Đã xóa");
                loadHistory();
              }
            } catch {
              Toasts.error("Lỗi xóa");
            }
          });
        });
      }

      async function showDetail(id) {
        try {
          const res = await fetch(`/api/compare/history/${id}`);
          if (!res.ok) throw new Error("Not found");
          const data = await res.json();

          document.getElementById("detailTitle").innerHTML =
            `<i class="fa-solid fa-code-compare" style="color:#d4a853"></i> ${escapeHtml(data.query)}`;

          let html = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px">';

          for (const engine of data.engines) {
            const items = (data.results[engine] && data.results[engine].items) || [];
            const hasError = data.errors && data.errors[engine];
            html += `<div class="card result-section" style="padding:var(--spacing-md)">
              <h3>
                <i class="fa-solid ${engineIcons[engine] || 'fa-search'}" style="color:${engineColors[engine] || '#666'}"></i>
                ${engineLabels[engine] || engine}
                <span class="badge" style="font-size:0.6rem">${items.length}</span>
                ${hasError ? `<span class="badge" style="background:rgba(239,68,68,.2);color:#ef4444;font-size:0.6rem">Error</span>` : ""}
              </h3>`;

            if (hasError) {
              html += `<div style="color:#ef4444;font-size:0.75rem;padding:8px 0">${escapeHtml(data.errors[engine])}</div>`;
            }

            for (const item of items.slice(0, 10)) {
              html += `<div class="result-item">
                <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener" style="font-weight:500;font-size:0.8rem">${escapeHtml(item.title)}</a>
                ${item.snippet ? `<div style="font-size:0.7rem;color:var(--text-tertiary);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${escapeHtml(item.snippet)}</div>` : ""}
              </div>`;
            }

            if (items.length > 10) {
              html += `<div style="font-size:0.7rem;color:var(--text-tertiary);padding-top:4px">+${items.length - 10} thêm</div>`;
            }

            html += `</div>`;
          }

          html += "</div>";
          document.getElementById("detailContent").innerHTML = html;
          document.getElementById("detailModal").style.display = "flex";
        } catch {
          Toasts.error("Không thể tải chi tiết");
        }
      }

      document.getElementById("detailModal").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) e.currentTarget.style.display = "none";
      });

      loadHistory();
    </script>
  </body>
</html>
