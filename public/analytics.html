<!DOCTYPE html>
<html lang="vi" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search Analytics</title>
    <meta name="description" content="Thống kê và phân tích tìm kiếm" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
      if (!window.Toasts) {
        window.Toasts = {
          show: function(msg, opts) { console.log("[Toast]", (opts && opts.type) || "info", msg); },
          success: function(msg) { console.log("[Toast] success", msg); },
          error: function(msg) { console.log("[Toast] error", msg); },
          warning: function(msg) { console.log("[Toast] warning", msg); },
          info: function(msg) { console.log("[Toast] info", msg); },
        };
      }
    </script>
    <style>
      .chart-bar { display: flex; align-items: flex-end; gap: 2px; height: 120px; margin-top: var(--spacing-sm); }
      .chart-bar .bar { flex: 1; background: var(--accent-primary, #d4a853); border-radius: 3px 3px 0 0; min-width: 8px; transition: height 0.3s; position: relative; }
      .chart-bar .bar:hover { opacity: 0.8; }
      .chart-bar .bar::after { content: attr(data-value); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); font-size: 0.5rem; color: var(--text-secondary); white-space: nowrap; }
      .chart-labels { display: flex; gap: 2px; font-size: 0.5rem; color: var(--text-tertiary); text-align: center; }
      .chart-labels span { flex: 1; min-width: 8px; }
      .donut-chart { width: 160px; height: 160px; border-radius: 50%; position: relative; }
      .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
      .stat-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: var(--spacing-md); text-align: center; }
      .stat-value { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #d4a853, #c49539); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .stat-label { font-size: 0.72rem; color: var(--text-secondary); margin-top: 4px; }
    </style>
  </head>
  <body>
    <a href="#mainContent" class="skip-link">Bỏ qua tới nội dung</a>
    <header class="app-header no-print">
      <div class="app-header-inner">
        <div class="brand">
          <span class="logo"><i class="fa-solid fa-hotel"></i></span>
          <span>Search Analytics</span>
        </div>
        <div class="flex gap-sm center" style="margin-left: auto">
          <span id="currentUser" class="text-secondary" style="font-size: 0.82rem"></span>
          <a href="/dashboard" class="btn btn-outline btn-small" title="Dashboard"><i class="fa-solid fa-chart-pie"></i></a>
          <button id="themeToggle" type="button" class="btn btn-outline btn-pill" title="Đổi giao diện">
            <i class="fa-solid fa-circle-half-stroke"></i>
          </button>
          <form method="POST" action="/logout" style="display:inline">
            <button type="submit" class="btn btn-outline btn-small"><i class="fa-solid fa-right-from-bracket"></i><span>Đăng xuất</span></button>
          </form>
        </div>
      </div>
    </header>

    <main id="mainContent" class="container stack-lg" style="padding-top: var(--spacing-lg); padding-bottom: var(--spacing-xl)">
      <div class="flex gap-md wrap" style="align-items: center">
        <h1 class="gradient-text" style="margin: 0; font-size: 1.8rem">
          <i class="fa-solid fa-chart-line"></i> Search Analytics
        </h1>
        <button id="refreshBtn" class="btn btn-outline">
          <i class="fa-solid fa-rotate"></i><span>Làm mới</span>
        </button>
      </div>
      <p class="text-secondary" style="margin: 0 0 var(--spacing-md)">
        Thống kê mẫu tìm kiếm, engine sử dụng, và xu hướng theo thời gian.
      </p>

      <div id="statsCards" class="grid" style="grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: var(--spacing-md)"></div>

      <div class="grid" style="grid-template-columns: 1fr 1fr; gap: var(--spacing-md)">
        <div class="glass-card">
          <h3 style="margin: 0 0 var(--spacing-sm); font-size: 0.9rem"><i class="fa-solid fa-magnifying-glass-chart"></i> Top Queries</h3>
          <div id="topQueries" class="stack-xs"></div>
        </div>
        <div class="glass-card">
          <h3 style="margin: 0 0 var(--spacing-sm); font-size: 0.9rem"><i class="fa-solid fa-server"></i> Engine Usage</h3>
          <div id="engineUsage" class="stack-xs"></div>
        </div>
      </div>

      <div class="glass-card">
        <h3 style="margin: 0 0 var(--spacing-sm); font-size: 0.9rem"><i class="fa-solid fa-clock"></i> Hourly Distribution</h3>
        <div id="hourlyChart" class="chart-bar"></div>
        <div id="hourlyLabels" class="chart-labels"></div>
      </div>

      <div class="glass-card">
        <h3 style="margin: 0 0 var(--spacing-sm); font-size: 0.9rem"><i class="fa-solid fa-chart-area"></i> Search Trends (30 days)</h3>
        <div id="trendsChart" class="chart-bar" style="height: 150px"></div>
        <div id="trendsLabels" class="chart-labels"></div>
      </div>
    </main>

    <footer class="app-footer text-tertiary">&copy; <span id="year"></span> PuuGoo</footer>
    <div class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="/ui.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("year").textContent = new Date().getFullYear();
        const stored = localStorage.getItem("theme");
        if (stored) document.documentElement.setAttribute("data-theme", stored);
        document.getElementById("themeToggle").addEventListener("click", () => {
          const cur = document.documentElement.getAttribute("data-theme");
          const next = cur === "dark" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", next);
          localStorage.setItem("theme", next);
        });

        fetch("/api/me").then(r => r.json()).then(user => {
          document.getElementById("currentUser").textContent = user.displayName || user.username;
        }).catch(() => {});

        const statsCards = document.getElementById("statsCards");
        const topQueries = document.getElementById("topQueries");
        const engineUsage = document.getElementById("engineUsage");
        const hourlyChart = document.getElementById("hourlyChart");
        const hourlyLabels = document.getElementById("hourlyLabels");
        const trendsChart = document.getElementById("trendsChart");
        const trendsLabels = document.getElementById("trendsLabels");

        function escapeHtml(str) {
          if (!str) return "";
          return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        function engineColor(engine) {
          const colors = { tavily: "#d4a853", google: "#3ba55d", ddg: "#faa61a", unknown: "#666" };
          return colors[engine] || "#d4a853";
        }

        async function loadAnalytics() {
          try {
            const [statsRes, hourlyRes, trendsRes] = await Promise.all([
              axios.get("/api/analytics/stats"),
              axios.get("/api/analytics/hourly"),
              axios.get("/api/analytics/trends"),
            ]);
            const stats = statsRes.data;
            const hourly = hourlyRes.data;
            const trends = trendsRes.data;

            // Stats cards
            statsCards.innerHTML = `
              <div class="stat-card">
                <div class="stat-value">${stats.totalSearches}</div>
                <div class="stat-label">Total Searches</div>
              </div>
              <div class="stat-card">
                <div class="stat-value">${stats.avgResults}</div>
                <div class="stat-label">Avg Results</div>
              </div>
              <div class="stat-card">
                <div class="stat-value">${stats.avgDuration}ms</div>
                <div class="stat-label">Avg Duration</div>
              </div>
              <div class="stat-card">
                <div class="stat-value">${Object.keys(stats.byEngine).length}</div>
                <div class="stat-label">Engines Used</div>
              </div>
            `;

            // Top queries
            if (stats.topQueries.length === 0) {
              topQueries.innerHTML = '<p class="text-tertiary" style="font-size: 0.78rem">Chưa có dữ liệu</p>';
            } else {
              topQueries.innerHTML = stats.topQueries.map((q, i) => `
                <div class="flex gap-sm" style="align-items: center; font-size: 0.78rem">
                  <span style="color: var(--text-tertiary); width: 20px">${i + 1}.</span>
                  <span style="flex: 1">${escapeHtml(q.query)}</span>
                  <span class="badge" style="font-size: 0.55rem; background: rgba(212,168,83,.15); color: #d4a853">${q.count}x</span>
                </div>
              `).join("");
            }

            // Engine usage
            const engineEntries = Object.entries(stats.byEngine);
            if (engineEntries.length === 0) {
              engineUsage.innerHTML = '<p class="text-tertiary" style="font-size: 0.78rem">Chưa có dữ liệu</p>';
            } else {
              const maxEngine = Math.max(...engineEntries.map(e => e[1]));
              engineUsage.innerHTML = engineEntries.map(([engine, count]) => `
                <div>
                  <div class="flex gap-sm" style="align-items: center; font-size: 0.78rem; margin-bottom: 2px">
                    <span style="flex: 1; text-transform: capitalize">${escapeHtml(engine)}</span>
                    <span>${count}</span>
                  </div>
                  <div style="height: 6px; background: var(--glass-border); border-radius: 3px; overflow: hidden">
                    <div style="height: 100%; width: ${(count / maxEngine) * 100}%; background: ${engineColor(engine)}; border-radius: 3px"></div>
                  </div>
                </div>
              `).join("");
            }

            // Hourly chart
            const hourlyData = hourly.hourly || [];
            const maxHourly = Math.max(...hourlyData, 1);
            hourlyChart.innerHTML = hourlyData.map((v, i) => `
              <div class="bar" style="height: ${Math.max((v / maxHourly) * 100, 2)}%; background: ${i >= 9 && i <= 21 ? 'var(--accent-primary, #d4a853)' : 'var(--text-tertiary)'}" data-value="${v}" title="${i}:00 - ${v} searches"></div>
            `).join("");
            hourlyLabels.innerHTML = hourlyData.map((_, i) => `<span>${i}</span>`).join("");

            // Trends chart
            const trendsData = trends.trends || [];
            const maxTrend = Math.max(...trendsData.map(t => t.count), 1);
            trendsChart.innerHTML = trendsData.map(t => `
              <div class="bar" style="height: ${Math.max((t.count / maxTrend) * 100, 2)}%" data-value="${t.count}" title="${t.date}: ${t.count} searches"></div>
            `).join("");
            trendsLabels.innerHTML = trendsData.map(t => `<span>${t.date.slice(5)}</span>`).join("");

          } catch (err) {
            console.error("Load analytics error:", err);
            Toasts.error("Không thể tải thống kê");
          }
        }

        document.getElementById("refreshBtn").addEventListener("click", loadAnalytics);
        loadAnalytics();
      });
    </script>
  </body>
</html>
