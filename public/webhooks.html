<!DOCTYPE html>
<html lang="vi" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Webhooks</title>
    <meta name="description" content="Quản lý webhook notifications" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&subset=vietnamese&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
      if (!window.Toasts) {
        window.Toasts = {
          show: function(msg, opts) { console.log("[Toast]", (opts && opts.type) || "info", msg); },
          success: function(msg) { console.log("[Toast] success", msg); },
          error: function(msg) { console.log("[Toast] error", msg); },
          warning: function(msg) { console.log("[Toast] warning", msg); },
          info: function(msg) { console.log("[Toast] info", msg); },
        };
      }
    </script>
  </head>
  <body>
    <a href="#mainContent" class="skip-link">Bỏ qua tới nội dung</a>
    <header class="app-header no-print">
      <div class="app-header-inner">
        <div class="brand">
          <span class="logo"><i class="fa-solid fa-hotel"></i></span>
          <span>Webhooks</span>
        </div>
        <div class="flex gap-sm center" style="margin-left: auto">
          <span id="currentUser" class="text-secondary" style="font-size: 0.82rem"></span>
          <a href="/dashboard" class="btn btn-outline btn-small" title="Dashboard"><i class="fa-solid fa-chart-pie"></i></a>
          <button id="themeToggle" type="button" class="btn btn-outline btn-pill" title="Đổi giao diện">
            <i class="fa-solid fa-circle-half-stroke"></i>
          </button>
          <form method="POST" action="/logout" style="display:inline">
            <button type="submit" class="btn btn-outline btn-small"><i class="fa-solid fa-right-from-bracket"></i><span>Đăng xuất</span></button>
          </form>
        </div>
      </div>
    </header>

    <main id="mainContent" class="container stack-lg" style="padding-top: var(--spacing-lg); padding-bottom: var(--spacing-xl)">
      <div class="flex gap-md wrap" style="align-items: center">
        <h1 class="gradient-text" style="margin: 0; font-size: 1.8rem">
          <i class="fa-solid fa-link"></i> Webhooks
        </h1>
        <button id="createBtn" class="btn btn-primary btn-modern">
          <i class="fa-solid fa-plus"></i><span>Tạo webhook</span>
        </button>
      </div>
      <p class="text-secondary" style="margin: 0 0 var(--spacing-md)">
        Nhận thông báo đến URL bên ngoài khi có sự kiện xảy ra.
      </p>

      <div id="statsBar" class="flex gap-md wrap" style="margin-bottom: var(--spacing-md)"></div>

      <section id="webhooksList" class="stack-sm"></section>
      <div id="emptyState" class="glass-card text-center hidden" style="padding: var(--spacing-xl)">
        <i class="fa-solid fa-link-slash" style="font-size: 2rem; color: var(--text-tertiary); margin-bottom: var(--spacing-sm)"></i>
        <p class="text-tertiary">Chưa có webhook nào. Nhấn "Tạo webhook" để bắt đầu.</p>
      </div>
    </main>

    <div id="webhookModal" class="modal-overlay hidden" role="dialog" aria-modal="true">
      <div class="modal" style="max-width: 500px">
        <h2 id="modalTitle" class="modal-header">Tạo Webhook</h2>
        <div class="stack-sm">
          <div>
            <label style="font-size: 0.82rem">Tên *</label>
            <input id="inputName" type="text" placeholder="VD: Slack notifications" style="width: 100%" />
          </div>
          <div>
            <label style="font-size: 0.82rem">URL *</label>
            <input id="inputUrl" type="url" placeholder="https://hooks.slack.com/..." style="width: 100%" />
          </div>
          <div>
            <label style="font-size: 0.82rem">Secret (tùy chọn)</label>
            <input id="inputSecret" type="text" placeholder="Mã xác thực webhook" style="width: 100%" />
          </div>
          <div>
            <label style="font-size: 0.82rem">Sự kiện</label>
            <div class="flex gap-sm wrap" style="margin-top: 4px">
              <label style="cursor: pointer; font-size: 0.78rem"><input type="checkbox" id="evtPriceAlert" checked /> Price Alert</label>
              <label style="cursor: pointer; font-size: 0.78rem"><input type="checkbox" id="evtSearchComplete" checked /> Search Complete</label>
              <label style="cursor: pointer; font-size: 0.78rem"><input type="checkbox" id="evtNewBookmark" /> New Bookmark</label>
            </div>
          </div>
          <label style="cursor: pointer; font-size: 0.82rem">
            <input type="checkbox" id="inputActive" checked /> Kích hoạt
          </label>
        </div>
        <div id="modalError" class="hidden" style="color: #ff8a8a; font-size: 0.75rem; margin-top: var(--spacing-sm)"></div>
        <div class="modal-actions" style="margin-top: var(--spacing-md)">
          <button id="modalCancel" type="button" class="btn btn-outline">Hủy</button>
          <button id="modalSave" type="button" class="btn btn-primary btn-modern">Lưu</button>
        </div>
      </div>
    </div>

    <footer class="app-footer text-tertiary">© <span id="year"></span> PuuGoo</footer>
    <div class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="/ui.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("year").textContent = new Date().getFullYear();
        const stored = localStorage.getItem("theme");
        if (stored) document.documentElement.setAttribute("data-theme", stored);
        document.getElementById("themeToggle").addEventListener("click", () => {
          const cur = document.documentElement.getAttribute("data-theme");
          const next = cur === "dark" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", next);
          localStorage.setItem("theme", next);
        });

        fetch("/api/me").then(r => r.json()).then(user => {
          document.getElementById("currentUser").textContent = user.displayName || user.username;
        }).catch(() => {});

        const statsBar = document.getElementById("statsBar");
        const webhooksList = document.getElementById("webhooksList");
        const emptyState = document.getElementById("emptyState");
        const modal = document.getElementById("webhookModal");
        const modalTitle = document.getElementById("modalTitle");
        const modalError = document.getElementById("modalError");
        let editingId = null;

        function escapeHtml(str) {
          if (!str) return "";
          return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        async function loadWebhooks() {
          try {
            const [webhooksRes, statsRes] = await Promise.all([
              axios.get("/api/webhooks"),
              axios.get("/api/webhooks/stats"),
            ]);
            const webhooks = webhooksRes.data;
            const stats = statsRes.data;

            statsBar.innerHTML = `
              <div class="badge" style="background: rgba(102,126,234,.2); color: #667eea">
                <i class="fa-solid fa-link"></i> ${stats.total} webhooks
              </div>
              <div class="badge" style="background: rgba(59,165,93,.2); color: #3ba55d">
                <i class="fa-solid fa-circle-check"></i> ${stats.active} active
              </div>
              <div class="badge" style="background: rgba(250,166,26,.2); color: #faa61a">
                <i class="fa-solid fa-bolt"></i> ${stats.totalTriggers} triggers
              </div>
            `;

            if (webhooks.length === 0) {
              webhooksList.innerHTML = "";
              emptyState.classList.remove("hidden");
              return;
            }
            emptyState.classList.add("hidden");

            webhooksList.innerHTML = webhooks.map(w => `
              <div class="glass-card" style="border-left: 3px solid ${w.active ? '#3ba55d' : '#666'}">
                <div class="flex gap-md wrap" style="align-items: flex-start">
                  <div style="flex: 1; min-width: 200px">
                    <div style="font-weight: 600; font-size: 0.9rem">
                      ${escapeHtml(w.name)}
                      <span class="badge" style="margin-left: 8px; font-size: 0.6rem; background: ${w.active ? 'rgba(59,165,93,.2); color: #3ba55d' : 'rgba(255,255,255,.1); color: var(--text-tertiary)'}">
                        ${w.active ? 'Active' : 'Paused'}
                      </span>
                    </div>
                    <div style="font-size: 0.7rem; margin-top: 4px; word-break: break-all; color: var(--text-secondary)">${escapeHtml(w.url)}</div>
                    <div class="flex gap-xs wrap" style="margin-top: 6px">
                      ${(w.events || []).map(e => `<span class="badge" style="font-size: 0.55rem; background: rgba(102,126,234,.15); color: #667eea">${escapeHtml(e)}</span>`).join("")}
                    </div>
                    <div class="text-tertiary" style="font-size: 0.6rem; margin-top: 4px">
                      Triggers: ${w.triggerCount || 0}
                      ${w.lastTriggeredAt ? ` • Lần cuối: ${new Date(w.lastTriggeredAt).toLocaleString("vi")}` : ""}
                      ${w.lastStatus ? ` • Status: ${w.lastStatus}` : ""}
                      ${w.lastError ? ` • Lỗi: ${escapeHtml(w.lastError)}` : ""}
                    </div>
                  </div>
                  <div class="flex gap-xs wrap" style="flex-shrink: 0">
                    <button class="btn btn-outline btn-small" data-action="test" data-id="${w.id}" title="Test webhook">
                      <i class="fa-solid fa-flask"></i>
                    </button>
                    <button class="btn btn-outline btn-small" data-action="toggle" data-id="${w.id}" data-active="${w.active}" title="${w.active ? 'Tạm dừng' : 'Kích hoạt'}">
                      <i class="fa-solid fa-${w.active ? 'pause' : 'play'}"></i>
                    </button>
                    <button class="btn btn-outline btn-small" data-action="edit" data-id="${w.id}" title="Sửa">
                      <i class="fa-solid fa-pen"></i>
                    </button>
                    <button class="btn btn-outline btn-small" data-action="delete" data-id="${w.id}" title="Xóa" style="--btn-accent: #ff4d4f">
                      <i class="fa-solid fa-trash"></i>
                    </button>
                  </div>
                </div>
              </div>
            `).join("");
          } catch (err) {
            console.error("Load webhooks error:", err);
            Toasts.error("Không thể tải webhooks");
          }
        }

        webhooksList.addEventListener("click", async (e) => {
          const btn = e.target.closest("[data-action]");
          if (!btn) return;
          const { action, id } = btn.dataset;

          if (action === "test") {
            btn.disabled = true;
            try {
              const res = await axios.post(`/api/webhooks/${id}/test`);
              if (res.data.success) {
                Toasts.success(`Test thành công (HTTP ${res.data.status})`);
              } else {
                Toasts.warning(`Test thất bại: ${res.data.message}`);
              }
              loadWebhooks();
            } catch (err) {
              Toasts.error("Lỗi test webhook");
            } finally {
              btn.disabled = false;
            }
          }

          if (action === "toggle") {
            const isActive = btn.dataset.active === "true";
            try {
              await axios.put(`/api/webhooks/${id}`, { active: !isActive });
              Toasts.success(isActive ? "Đã tạm dừng" : "Đã kích hoạt");
              loadWebhooks();
            } catch { Toasts.error("Lỗi cập nhật"); }
          }

          if (action === "edit") {
            try {
              const res = await axios.get("/api/webhooks");
              const webhook = res.data.find(w => w.id === id);
              if (!webhook) return;
              editingId = id;
              modalTitle.textContent = "Sửa Webhook";
              document.getElementById("inputName").value = webhook.name;
              document.getElementById("inputUrl").value = webhook.url;
              document.getElementById("inputSecret").value = webhook.secret || "";
              document.getElementById("inputActive").checked = webhook.active;
              document.getElementById("evtPriceAlert").checked = (webhook.events || []).includes("price_alert");
              document.getElementById("evtSearchComplete").checked = (webhook.events || []).includes("search_complete");
              document.getElementById("evtNewBookmark").checked = (webhook.events || []).includes("new_bookmark");
              modalError.classList.add("hidden");
              modal.classList.remove("hidden");
            } catch { Toasts.error("Lỗi tải webhook"); }
          }

          if (action === "delete") {
            if (!confirm("Xóa webhook này?")) return;
            try {
              await axios.delete(`/api/webhooks/${id}`);
              Toasts.success("Đã xóa webhook");
              loadWebhooks();
            } catch { Toasts.error("Lỗi xóa"); }
          }
        });

        document.getElementById("createBtn").addEventListener("click", () => {
          editingId = null;
          modalTitle.textContent = "Tạo Webhook";
          document.getElementById("inputName").value = "";
          document.getElementById("inputUrl").value = "";
          document.getElementById("inputSecret").value = "";
          document.getElementById("inputActive").checked = true;
          document.getElementById("evtPriceAlert").checked = true;
          document.getElementById("evtSearchComplete").checked = true;
          document.getElementById("evtNewBookmark").checked = false;
          modalError.classList.add("hidden");
          modal.classList.remove("hidden");
        });

        document.getElementById("modalSave").addEventListener("click", async () => {
          const name = document.getElementById("inputName").value.trim();
          const url = document.getElementById("inputUrl").value.trim();
          const secret = document.getElementById("inputSecret").value.trim();
          const active = document.getElementById("inputActive").checked;
          const events = [];
          if (document.getElementById("evtPriceAlert").checked) events.push("price_alert");
          if (document.getElementById("evtSearchComplete").checked) events.push("search_complete");
          if (document.getElementById("evtNewBookmark").checked) events.push("new_bookmark");

          if (!name || !url) {
            modalError.textContent = "Vui lòng nhập tên và URL";
            modalError.classList.remove("hidden");
            return;
          }

          try {
            if (editingId) {
              await axios.put(`/api/webhooks/${editingId}`, { name, url, secret, events, active });
              Toasts.success("Đã cập nhật webhook");
            } else {
              await axios.post("/api/webhooks", { name, url, secret, events, active });
              Toasts.success("Đã tạo webhook");
            }
            modal.classList.add("hidden");
            loadWebhooks();
          } catch (err) {
            modalError.textContent = err.response?.data?.error || "Lỗi lưu";
            modalError.classList.remove("hidden");
          }
        });

        document.getElementById("modalCancel").addEventListener("click", () => modal.classList.add("hidden"));
        modal.addEventListener("click", (e) => { if (e.target === modal) modal.classList.add("hidden"); });

        loadWebhooks();
      });
    </script>
  </body>
</html>
