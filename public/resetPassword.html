<!DOCTYPE html>
<html lang="vi" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đặt lại mật khẩu | Hotel Search</title>
    <meta name="description" content="Đặt lại mật khẩu mới" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
      if (!window.Toasts) {
        window.Toasts = {
          show: function(msg, opts) { console.log("[Toast]", (opts && opts.type) || "info", msg); },
          success: function(msg) { console.log("[Toast] success", msg); },
          error: function(msg) { console.log("[Toast] error", msg); },
          warning: function(msg) { console.log("[Toast] warning", msg); },
          info: function(msg) { console.log("[Toast] info", msg); },
        };
      }
    </script>
  </head>
  <body>
    <a href="#resetForm" class="skip-link">Bỏ qua tới form</a>
    <header class="app-header no-print">
      <div class="app-header-inner">
        <div class="brand">
          <span class="logo"><i class="fa-solid fa-hotel"></i></span>
          <span>Hotel Search</span>
        </div>
        <div class="flex gap-sm center" style="margin-left: auto">
          <button id="themeToggle" type="button" class="btn btn-outline btn-pill" title="Đổi giao diện">
            <i class="fa-solid fa-circle-half-stroke"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="container" style="min-height: calc(100vh - 140px); display: flex; align-items: center; justify-content: center">
      <div class="glass-card gradient animate-fade-in" style="max-width: 440px; width: 100%">
        <h1 class="gradient-text" style="font-size: 1.4rem; margin: 0 0 6px">
          <i class="fa-solid fa-lock"></i> Đặt lại mật khẩu
        </h1>
        <p class="text-secondary" style="margin-top: 0; margin-bottom: var(--spacing-md); font-size: 0.82rem">
          Nhập mã đặt lại và mật khẩu mới.
        </p>

        <div id="invalidToken" style="display: none">
          <div class="glass-card" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); text-align: center">
            <i class="fa-solid fa-circle-xmark" style="font-size: 2rem; color: #ef4444; margin-bottom: 8px"></i>
            <p style="color: #ef4444; font-weight: 600; margin: 0 0 8px">Mã không hợp lệ hoặc đã hết hạn</p>
            <a href="/forgot-password" class="btn btn-outline btn-small">
              <i class="fa-solid fa-arrow-left"></i> Yêu cầu mã mới
            </a>
          </div>
        </div>

        <form id="resetForm" class="stack-sm">
          <div class="form-col">
            <label for="token">Mã đặt lại</label>
            <div class="input-group">
              <span class="input-icon"><i class="fa-solid fa-key"></i></span>
              <input id="token" type="text" class="has-icon" required placeholder="Nhập mã đặt lại" />
            </div>
          </div>
          <div class="form-col">
            <label for="newPassword">Mật khẩu mới</label>
            <div class="input-group">
              <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
              <input id="newPassword" type="password" class="has-icon" autocomplete="new-password" required placeholder="Tối thiểu 8 ký tự" />
            </div>
          </div>
          <div class="form-col">
            <label for="confirmPassword">Xác nhận mật khẩu</label>
            <div class="input-group">
              <span class="input-icon"><i class="fa-solid fa-shield-halved"></i></span>
              <input id="confirmPassword" type="password" class="has-icon" autocomplete="new-password" required placeholder="Nhập lại mật khẩu" />
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-modern" style="margin-top: var(--spacing-xs)">
            <i class="fa-solid fa-check"></i><span>Đặt lại mật khẩu</span>
          </button>
        </form>

        <div id="successSection" style="display: none; margin-top: var(--spacing-md)">
          <div class="glass-card" style="background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); text-align: center">
            <i class="fa-solid fa-check-circle" style="font-size: 2rem; color: #22c55e; margin-bottom: 8px"></i>
            <p style="color: #22c55e; font-weight: 600; margin: 0 0 8px">Đặt lại mật khẩu thành công!</p>
            <p style="font-size: 0.82rem; color: var(--text-secondary); margin: 0 0 12px">Bạn có thể đăng nhập bằng mật khẩu mới.</p>
            <a href="/" class="btn btn-primary btn-small">
              <i class="fa-solid fa-right-to-bracket"></i> Đăng nhập
            </a>
          </div>
        </div>

        <div class="card-footer" style="margin-top: var(--spacing-md)">
          <a href="/" style="color: var(--text-tertiary); font-size: 0.78rem">
            <i class="fa-solid fa-arrow-left"></i> Quay lại đăng nhập
          </a>
        </div>
      </div>
    </main>

    <script type="module" src="/ui.js"></script>
    <script type="module">
      import { createPasswordStrengthIndicator } from "/passwordStrength.js";

      document.addEventListener("DOMContentLoaded", () => {
        const btn = document.getElementById("themeToggle");
        const applyIcon = () => {
          const th = document.documentElement.getAttribute("data-theme");
          btn.innerHTML = th === "light" ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
        };
        btn.addEventListener("click", () => {
          const cur = document.documentElement.getAttribute("data-theme");
          const next = cur === "dark" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", next);
          localStorage.setItem("theme", next);
          applyIcon();
        });
        const stored = localStorage.getItem("theme");
        if (stored) document.documentElement.setAttribute("data-theme", stored);
        applyIcon();

        // Get token from URL
        const params = new URLSearchParams(window.location.search);
        const urlToken = params.get("token");
        if (urlToken) {
          document.getElementById("token").value = urlToken;
          document.getElementById("token").readOnly = true;
        }

        // Password strength indicator
        createPasswordStrengthIndicator(document.getElementById("newPassword"));

        // Validate token on load if present
        if (urlToken) {
          fetch("/api/reset-password/validate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: urlToken }),
          }).then(r => r.json()).then(data => {
            if (!data.valid) {
              document.getElementById("resetForm").style.display = "none";
              document.getElementById("invalidToken").style.display = "block";
            }
          });
        }

        document.getElementById("resetForm").addEventListener("submit", async (e) => {
          e.preventDefault();
          const token = document.getElementById("token").value.trim();
          const newPassword = document.getElementById("newPassword").value;
          const confirmPassword = document.getElementById("confirmPassword").value;

          if (newPassword !== confirmPassword) {
            Toasts.error("Mật khẩu không khớp");
            return;
          }
          if (newPassword.length < 8) {
            Toasts.error("Mật khẩu phải >= 8 ký tự");
            return;
          }
          if (!/[A-Z]/.test(newPassword) || !/[a-z]/.test(newPassword) || !/\d/.test(newPassword) || !/[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?`~]/.test(newPassword)) {
            Toasts.error("Mật khẩu phải có chữ hoa, chữ thường, số và ký tự đặc biệt");
            return;
          }

          try {
            const res = await fetch("/api/reset-password", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ token, newPassword }),
            });
            const data = await res.json();

            if (data.success) {
              document.getElementById("resetForm").style.display = "none";
              document.getElementById("successSection").style.display = "block";
              Toasts.success("Đặt lại mật khẩu thành công");
            } else {
              Toasts.error(data.error || "Lỗi đặt lại mật khẩu");
            }
          } catch {
            Toasts.error("Lỗi kết nối");
          }
        });
      });
    </script>
  </body>
</html>
