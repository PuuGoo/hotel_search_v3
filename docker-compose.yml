services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DDG_SERVER_URL=http://ddg-server:5001
    depends_on:
      ddg-server:
        condition: service_healthy
    restart: unless-stopped

  ddg-server:
    build:
      context: .
      dockerfile: Dockerfile.ddg
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
